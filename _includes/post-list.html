{% assign posts_limit = include.limit | default: site.posts.size %}
{% for post in site.posts limit: posts_limit %}
<article class="mb-12">
  <h2 class="text-2xl font-bold mb-2">
    <a href="{{ post.url }}" class="group hover:text-red-500 transition-colors">
      {{ post.title }}
      <span class="inline-block text-red-500 transition-transform group-hover:translate-x-1" aria-hidden="true">→</span>
    </a>
  </h2>
  <time datetime="{{ post.date | date_to_xmlschema }}" class="block text-sm text-gray-500 dark:text-gray-400 mb-4">
    {{ post.date | date: "%-d %B %Y" }}
  </time>
  <p class="text-gray-700 dark:text-gray-300">{{ post.excerpt }}</p>
</article>
{% endfor %}
